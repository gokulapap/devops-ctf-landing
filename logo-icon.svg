<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowVert" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#0f172a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="flagBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="neon" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flagGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M140 40 L32 80 L32 175 Q32 258 140 300 Q248 258 248 175 L248 80 Z"/>
    </clipPath>
  </defs>

  <!-- Shield outer glow -->
  <path d="M140 40 L32 80 L32 175 Q32 258 140 300 Q248 258 248 175 L248 80 Z"
        fill="url(#shieldFill)" stroke="url(#glow)" stroke-width="4" stroke-linejoin="round" filter="url(#outerGlow)"/>

  <!-- Circuit/grid lines inside shield -->
  <g clip-path="url(#shieldClip)" opacity="0.06">
    <line x1="32" y1="120" x2="248" y2="120" stroke="#06b6d4" stroke-width="1"/>
    <line x1="32" y1="160" x2="248" y2="160" stroke="#06b6d4" stroke-width="1"/>
    <line x1="32" y1="200" x2="248" y2="200" stroke="#06b6d4" stroke-width="1"/>
    <line x1="32" y1="240" x2="248" y2="240" stroke="#06b6d4" stroke-width="1"/>
    <line x1="100" y1="40" x2="100" y2="300" stroke="#06b6d4" stroke-width="1"/>
    <line x1="140" y1="40" x2="140" y2="300" stroke="#06b6d4" stroke-width="1"/>
    <line x1="180" y1="40" x2="180" y2="300" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- Inner shield border -->
  <path d="M140 56 L50 90 L50 172 Q50 246 140 284 Q230 246 230 172 L230 90 Z"
        fill="none" stroke="url(#glow)" stroke-width="1" stroke-linejoin="round" opacity="0.2"/>

  <!-- Small corner nodes (circuit board feel) -->
  <circle cx="50" cy="90" r="3" fill="url(#glow)" opacity="0.3"/>
  <circle cx="230" cy="90" r="3" fill="url(#glow)" opacity="0.3"/>
  <circle cx="140" cy="56" r="3" fill="url(#glow)" opacity="0.3"/>

  <!-- Terminal chevron >_ -->
  <g filter="url(#neon)">
    <path d="M80 140 L120 170 L80 200" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="136" y="192" width="48" height="8" rx="4" fill="#22c55e"/>
  </g>

  <!-- Flag — planted at shield peak -->
  <g filter="url(#flagGlow)">
    <!-- Pole -->
    <rect x="138" y="10" width="4" height="62" rx="2" fill="url(#flagBody)"/>
    <!-- Flag cloth — waving shape -->
    <path d="M142 14 C156 8 168 18 182 12 L182 38 C168 44 156 34 142 40 Z" fill="url(#flagBody)" opacity="0.85"/>
    <!-- Flag highlight -->
    <path d="M152 20 C160 17 166 22 174 19 L174 32 C166 35 160 30 152 33 Z" fill="#0f172a" opacity="0.2"/>
  </g>

  <!-- Decorative dots at bottom -->
  <circle cx="120" cy="260" r="2" fill="url(#glow)" opacity="0.2"/>
  <circle cx="140" cy="268" r="2" fill="url(#glow)" opacity="0.15"/>
  <circle cx="160" cy="260" r="2" fill="url(#glow)" opacity="0.2"/>
</svg>
